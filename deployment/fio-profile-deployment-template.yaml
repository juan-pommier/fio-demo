---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${DEPLOY_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${DEPLOY_NAME}
  template:
    metadata:
      labels:
        app: ${DEPLOY_NAME}
    spec:
      containers:
        - name: fio
          image: ghcr.io/containers/fio:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /data
              fallocate -l 8G /data/testfile || dd if=/dev/zero of=/data/testfile bs=1M count=8192
              fio --name=${PROFILE}demo-pvc-perf \
                --filename=/data/testfile \
                --rw=randrw \
                --rwmixread=${RWMIX} \
                --bs=4k \
                --size=8G \
                --numjobs=4 \
                --runtime=600 \
                --time_based \
                --iodepth=32 \
                --direct=1 \
                --ioengine=libaio \
                --group_reporting
          volumeMounts:
            - name: fio-pvc
              mountPath: /data
      volumes:
        - name: fio-pvc
          persistentVolumeClaim:
            claimName: ${PVC_NAME}
