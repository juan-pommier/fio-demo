# Deployment definition
apiVersion: v1
kind: Pod
metadata:
  name: fio-pod
spec:
  containers:
  - name: fio
    image: ljishen/fio
    resources:
      requests:
        cpu: "2"
        memory: "2Gi"
      limits:
        cpu: "4"
        memory: "4Gi"
    command: ["/bin/sh", "-c"]
    args:
      - |
        set -e
        mkdir -p /data
        fallocate -l 8G /data/testfile || dd if=/dev/zero of=/data/testfile bs=1M count=8192
        echo "Generating high-IOPS, low-latency workload (80% reads, 20% writes)..."
        fio --name=highiops \
          --filename=/data/testfile \
          --rw=randrw \
          --rwmixread=80 \
          --bs=4k \
          --size=8G \
          --numjobs=4 \
          --runtime=600 \
          --time_based \
          --iodepth=32 \
          --direct=1 \
          --ioengine=libaio \
          --group_reporting
    volumeMounts:
    - mountPath: /data
      name: fio-volume
  restartPolicy: Always
  volumes:
  - name: fio-volume
    persistentVolumeClaim:
      claimName: fio-pvc
